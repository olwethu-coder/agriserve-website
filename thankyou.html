<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Thank You - AgriServe Consulting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFF8F0 0%, #F5EDE0 100%);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #FFF8F0, #F5EDE0, #FFF8F0, #F0E8DC);
            background-size: 300% 300%;
            animation: gradientShift 15s ease infinite;
            z-index: -2;
        }

        /* ===== PARTICLE BACKGROUND ===== */
        @keyframes floatParticle {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100px) translateX(20px);
                opacity: 0;
            }
        }

        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(197, 90, 17, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            animation: floatParticle 8s infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; background: rgba(141, 198, 63, 0.3); }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; background: rgba(197, 90, 17, 0.3); }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; background: rgba(88, 110, 32, 0.3); }
        .particle:nth-child(4) { left: 40%; animation-delay: 1s; background: rgba(141, 198, 63, 0.3); }
        .particle:nth-child(5) { left: 50%; animation-delay: 3s; background: rgba(197, 90, 17, 0.3); }
        .particle:nth-child(6) { left: 60%; animation-delay: 5s; background: rgba(88, 110, 32, 0.3); }
        .particle:nth-child(7) { left: 70%; animation-delay: 2.5s; background: rgba(141, 198, 63, 0.3); }
        .particle:nth-child(8) { left: 80%; animation-delay: 4.5s; background: rgba(197, 90, 17, 0.3); }
        .particle:nth-child(9) { left: 90%; animation-delay: 1.5s; background: rgba(88, 110, 32, 0.3); }
        .particle:nth-child(10) { left: 95%; animation-delay: 3.5s; background: rgba(141, 198, 63, 0.3); }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ===== BOUNCE IN ANIMATION ===== */
        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            60% {
                opacity: 1;
                transform: scale(1.05);
            }
            80% {
                transform: scale(0.98);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .thankyou-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid #F0E5D8;
            animation: bounceIn 0.8s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        /* Header with Logo - MATCHES NAVBAR STYLE */
        .thankyou-header {
            background: linear-gradient(135deg, #093400 0%, #1a5a2e 100%);
            padding: 30px 30px;
            text-align: center;
            border-bottom: 3px solid #C55A11;
            position: relative;
            overflow: hidden;
        }

        /* ===== FLOATING ELEMENTS IN HEADER ===== */
        @keyframes floatIcon {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        .floating-icon {
            position: absolute;
            font-size: 2rem;
            opacity: 0.2;
            pointer-events: none;
            animation: floatIcon 6s ease-in-out infinite;
        }

        .floating-icon:nth-child(1) { top: 10px; left: 20px; animation-delay: 0s; }
        .floating-icon:nth-child(2) { bottom: 10px; right: 20px; animation-delay: 1s; }
        .floating-icon:nth-child(3) { top: 50%; left: 10px; animation-delay: 2s; }
        .floating-icon:nth-child(4) { bottom: 20%; right: 15px; animation-delay: 3s; }

        /* Logo Container - RECTANGULAR like navbar */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        /* Logo styling - MATCHES NAVBAR LOGO (rectangular, no circle) */
        .thankyou-logo {
            height: 65px;
            width: auto;
            max-width: 300px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .thankyou-logo:hover {
            transform: scale(1.02);
        }

        .thankyou-header h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .thankyou-header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            position: relative;
            z-index: 1;
        }

        /* ===== SUCCESS ICON WITH ANIMATIONS ===== */
        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(141, 198, 63, 0.4);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 0 20px rgba(141, 198, 63, 0);
                transform: scale(1.05);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(141, 198, 63, 0);
                transform: scale(1);
            }
        }

        @keyframes drawCheck {
            0% {
                stroke-dashoffset: 50;
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                stroke-dashoffset: 0;
                opacity: 1;
            }
        }

        .success-icon {
            text-align: center;
            margin: -30px auto 0;
            position: relative;
            z-index: 10;
        }

        .success-icon svg {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 5px 15px rgba(141, 198, 63, 0.3));
            animation: pulseGlow 2s ease-in-out infinite;
        }

        .success-icon svg circle {
            fill: #8DC63F;
            stroke: white;
            stroke-width: 3;
        }

        .success-icon svg path {
            stroke: white;
            stroke-width: 4;
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: drawCheck 0.8s ease-out forwards;
        }

        /* Content Sections */
        .content-section {
            padding: 30px;
        }

        /* ===== SLIDE-IN ANIMATIONS ===== */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .confirmation-message {
            background: #F8F9FA;
            border-left: 4px solid #8DC63F;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            animation: slideInLeft 0.6s ease forwards;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        .info-section {
            background: #F5F5F5;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            animation: slideInRight 0.6s ease forwards;
            opacity: 0;
            animation-delay: 0.2s;
            animation-fill-mode: forwards;
        }

        .company-message {
            background: #093400;
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            animation: slideInLeft 0.6s ease forwards;
            opacity: 0;
            animation-delay: 0.4s;
            animation-fill-mode: forwards;
        }

        .contact-footer {
            background: #F5F5F5;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            animation: slideInRight 0.6s ease forwards;
            opacity: 0;
            animation-delay: 0.6s;
            animation-fill-mode: forwards;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
            animation: slideInUp 0.6s ease forwards;
            opacity: 0;
            animation-delay: 0.8s;
            animation-fill-mode: forwards;
        }

        /* ===== TYPEWRITER EFFECT ===== */
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blinkCursor {
            50% { border-color: transparent; }
        }

        .typewriter-text {
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid #8DC63F;
            animation: typing 2s steps(40, end), blinkCursor 0.75s step-end 4;
            width: fit-content;
            margin-bottom: 15px;
        }

        /* Info Grid */
        .info-section h3 {
            color: #C55A11;
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #E0E0E0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 12px;
        }

        .info-label {
            font-weight: 600;
            color: #093400;
            padding: 8px 0;
        }

        .info-value {
            color: #586E20;
            padding: 8px 0;
            word-break: break-word;
        }

        .info-value.highlight {
            color: #C55A11;
            font-weight: 500;
        }

        /* Company Message Animation */
        .company-message::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(141, 198, 63, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .company-message h4 {
            color: #FFD700;
            font-size: 1.2rem;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .company-message p {
            line-height: 1.6;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .company-signature {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .company-signature p {
            margin-bottom: 5px;
        }

        .company-signature strong {
            color: #FFD700;
        }

        /* Contact Footer */
        .contact-footer p {
            color: #093400;
            margin-bottom: 8px;
        }

        .contact-footer a {
            color: #C55A11;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .contact-footer a:hover {
            text-decoration: underline;
            color: #8DC63F;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #C55A11, #8DC63F);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(197, 90, 17, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #093400;
            border: 2px solid #8DC63F;
        }

        .btn-secondary:hover {
            background: #8DC63F;
            color: #093400;
            transform: translateY(-3px);
        }

        /* Empty State */
        .empty-state {
            background: #FFF3CD;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            animation: slideInUp 0.6s ease forwards;
        }

        .empty-state a {
            color: #C55A11;
            text-decoration: none;
            font-weight: 600;
        }

        .empty-state a:hover {
            text-decoration: underline;
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }

            .thankyou-header {
                padding: 25px 20px;
            }

            .thankyou-logo {
                height: 50px;
                max-width: 220px;
            }

            .thankyou-header h1 {
                font-size: 1.5rem;
            }

            .content-section {
                padding: 20px;
            }

            .info-grid {
                grid-template-columns: 1fr;
                gap: 5px;
            }

            .info-label {
                padding-bottom: 0;
            }

            .info-value {
                padding-top: 0;
                margin-bottom: 10px;
            }

            .button-group {
                flex-direction: column;
                gap: 10px;
            }

            .btn {
                text-align: center;
            }

            .typewriter-text {
                white-space: normal;
                border-right: none;
                animation: none;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <div class="container">
        <div class="thankyou-card">
            <!-- Header with Logo - RECTANGULAR like navbar -->
            <div class="thankyou-header">
                <div class="floating-icon">🌿</div>
                <div class="floating-icon">🌾</div>
                <div class="floating-icon">🍃</div>
                <div class="floating-icon">🌱</div>
                <div class="logo-container">
                    <img src="Screenshot 2026-03-10 100855.png" alt="AgriServe Consulting Logo" class="thankyou-logo">
                </div>
                <h1>Thank You for Contacting Us!</h1>
                <p>Your inquiry has been received and is being processed</p>
            </div>

            <!-- Animated Success Icon -->
            <div class="success-icon">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="#8DC63F" stroke="white" stroke-width="3"/>
                    <path d="M30 50 L45 65 L70 35" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <!-- Content Section -->
            <div class="content-section" id="contentSection">
                <!-- This will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // ===== CONFETTI ANIMATION =====
        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#C55A11', '#8DC63F', '#586E20', '#FFD700', '#9FD7CC'];

            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 6 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speed: Math.random() * 3 + 2,
                    rotation: Math.random() * 360,
                    rotationSpeed: Math.random() * 10 - 5
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                let allGone = true;
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    if (p.y < canvas.height) {
                        allGone = false;
                        p.y += p.speed;
                        p.rotation += p.rotationSpeed;
                        
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rotation * Math.PI / 180);
                        ctx.fillStyle = p.color;
                        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                        ctx.restore();
                    }
                }
                
                if (!allGone) {
                    requestAnimationFrame(animate);
                }
            }
            
            animate();
            
            // Stop confetti after 4 seconds
            setTimeout(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }, 4000);
        }

        // ===== DISPLAY SUBMITTED INFO =====
        function displaySubmittedInfo() {
            const savedData = localStorage.getItem('submittedFormData');
            const contentSection = document.getElementById('contentSection');
            
            if (savedData) {
                const data = JSON.parse(savedData);
                
                contentSection.innerHTML = `
                    <!-- Confirmation Message with Typewriter Effect -->
                    <div class="confirmation-message">
                        <div class="typewriter-text">
                            <p><strong>✅ Your submission has been successfully received.</strong></p>
                        </div>
                        <p>Below is a copy of the information you submitted for your records.</p>
                    </div>

                    <!-- Submitted Information Section -->
                    <div class="info-section">
                        <h3>📋 Your Submission Details</h3>
                        <div class="info-grid">
                            <div class="info-label">Full Name:</div>
                            <div class="info-value">${escapeHtml(data.name) || 'Not provided'}</div>
                            
                            <div class="info-label">Email Address:</div>
                            <div class="info-value">${escapeHtml(data.email) || 'Not provided'}</div>
                            
                            <div class="info-label">Company:</div>
                            <div class="info-value">${escapeHtml(data.company) || 'Not provided'}</div>
                            
                            <div class="info-label">Service Interest:</div>
                            <div class="info-value highlight">${escapeHtml(data.service) || 'Not selected'}</div>
                            
                            <div class="info-label">Your Message:</div>
                            <div class="info-value">${escapeHtml(data.message) || 'Not provided'}</div>
                            
                            <div class="info-label">Submission Time:</div>
                            <div class="info-value">${escapeHtml(data.timestamp) || new Date().toLocaleString()}</div>
                        </div>
                    </div>

                    <!-- Company Confirmation Message -->
                    <div class="company-message">
                        <h4>📧 Good day,</h4>
                        <p>This email serves to confirm receipt of your business inquiry. A member of our team will be in contact with you within the next 24 hours to arrange a time to discuss the requested services.</p>
                        <div class="company-signature">
                            <p><strong>Kind Regards,</strong></p>
                            <p><strong>AGRISERVE CONSULTING TEAM</strong></p>
                            <p>Email: info@agri-serve.co.za</p>
                            <p>Address: Pretoria | Gauteng</p>
                            <p>Website: www.agri-serve.co.za</p>
                        </div>
                    </div>

                    <!-- Contact Footer -->
                    <div class="contact-footer">
                        <p>📧 <strong>Email:</strong> <a href="mailto:info@agri-serve.co.za">info@agri-serve.co.za</a></p>
                        <p>📍 <strong>Location:</strong> Pretoria, Gauteng, South Africa</p>
                        <p>🌐 <strong>Website:</strong> <a href="https://olwethu-coder.github.io/agriserve-website/">www.agri-serve.co.za</a></p>
                    </div>

                    <!-- Action Buttons -->
                    <div class="button-group">
                        <a href="index.html" class="btn btn-primary">🏠 Return to Homepage</a>
                        <a href="services.html" class="btn btn-secondary">📋 View Our Services</a>
                        <a href="index.html#contact" class="btn btn-secondary">✉️ Contact Us Again</a>
                    </div>
                `;
                
                // Start confetti animation
                startConfetti();
                
                // Clear localStorage after displaying
                localStorage.removeItem('submittedFormData');
            } else {
                contentSection.innerHTML = `
                    <div class="confirmation-message">
                        <p><strong>⚠️ No submission data found.</strong></p>
                        <p>This page is meant to be accessed after submitting the contact form.</p>
                    </div>
                    
                    <div class="empty-state">
                        <p>Please use the <a href="index.html#contact">contact form</a> to submit an inquiry.</p>
                    </div>
                    
                    <div class="company-message">
                        <h4>📧 Good day,</h4>
                        <p>Thank you for your interest in AgriServe Consulting. Please fill out our contact form to submit an inquiry, and a member of our team will respond within 24 hours.</p>
                        <div class="company-signature">
                            <p><strong>Kind Regards,</strong></p>
                            <p><strong>AGRISERVE CONSULTING TEAM</strong></p>
                            <p>Email: info@agri-serve.co.za</p>
                            <p>Address: Pretoria | Gauteng</p>
                            <p>Website: www.agri-serve.co.za</p>
                        </div>
                    </div>
                    
                    <div class="button-group">
                        <a href="index.html" class="btn btn-primary">🏠 Return to Homepage</a>
                        <a href="index.html#contact" class="btn btn-secondary">✉️ Go to Contact Form</a>
                    </div>
                `;
            }
        }
        
        // Helper function to escape HTML special characters
        function escapeHtml(text) {
            if (!text) return text;
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Handle window resize for confetti canvas
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confetti-canvas');
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
        
        // Run on page load
        document.addEventListener('DOMContentLoaded', function() {
            displaySubmittedInfo();
        });
    </script>
</body>
</html>
