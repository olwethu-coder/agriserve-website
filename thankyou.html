<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Thank You - AgriServe Consulting</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .thankyou-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 20px;
        }
        .thankyou-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 40px var(--shadow-color);
            max-width: 600px;
            margin: 0 auto;
            border-left: 5px solid #8DC63F;
        }
        .thankyou-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .thankyou-card h1 {
            color: var(--text-primary);
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .thankyou-card p {
            color: var(--text-primary);
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-home {
            background: linear-gradient(135deg, #C55A11, #8DC63F);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(197, 90, 17, 0.3);
        }
        @media (max-width: 768px) {
            .thankyou-card {
                padding: 40px 25px;
            }
            .thankyou-card h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="thankyou-container">
        <div class="thankyou-card">
            <div class="thankyou-icon">✅</div>
            <h1>Thank You!</h1>
            <p>Your message has been successfully sent to AgriServe Consulting.</p>
            <p>We will review your inquiry and get back to you within 24 hours.</p>
            <a href="index.html" class="btn-home">Return to Homepage</a>
        </div>
    </div>
</body>
</html>
